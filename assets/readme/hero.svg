<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="fm-validator: financial model audit pipeline">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#16344F"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- faint grid, referencing the report's own tabular/ledger structure -->
  <g opacity="0.06" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- eyebrow: category, mono, terminal-native -->
  <text x="60" y="72" font-family="'SF Mono','Consolas','Menlo',monospace" font-size="15" letter-spacing="2.5" fill="#9FB8D0">FINANCIAL MODEL AUDIT PIPELINE</text>

  <!-- title -->
  <text x="60" y="150" font-family="'Helvetica Neue','Arial',sans-serif" font-weight="800" font-size="72" letter-spacing="-1.5" fill="#FFFFFF">fm-validator</text>

  <!-- concrete description -->
  <text x="60" y="196" font-family="'Helvetica Neue','Arial',sans-serif" font-size="20" fill="#D6E4F0">Deterministic checks + Claude semantic review &#8594; a 16-tab reliance-readiness report</text>

  <!-- process cue, mono, mirrors the real CLI's own [1/6]...[6/6] pipeline output -->
  <text x="60" y="230" font-family="'SF Mono','Consolas','Menlo',monospace" font-size="14" letter-spacing="1" fill="#7FA0C2">TIER 0  &#8594;  TIER 1  &#8594;  TIER 2  &#8594;  REPORT</text>

  <!-- signature: real priority badges, exact colors from build_report.py's own P1_FILL/P1_TXT etc -->
  <g transform="translate(60, 258)">
    <rect x="0" y="0" width="64" height="34" rx="6" fill="#FDECEC"/>
    <text x="32" y="22" font-family="'SF Mono','Consolas','Menlo',monospace" font-weight="700" font-size="15" fill="#9B1C1C" text-anchor="middle">P1</text>

    <rect x="76" y="0" width="64" height="34" rx="6" fill="#FFF4E5"/>
    <text x="108" y="22" font-family="'SF Mono','Consolas','Menlo',monospace" font-weight="700" font-size="15" fill="#9A5B00" text-anchor="middle">P2</text>

    <rect x="152" y="0" width="64" height="34" rx="6" fill="#EEF4FA"/>
    <text x="184" y="22" font-family="'SF Mono','Consolas','Menlo',monospace" font-weight="700" font-size="15" fill="#24435C" text-anchor="middle">P3</text>
  </g>

  <!-- small repository metadata, bottom-left -->
  <text x="60" y="308" font-family="'SF Mono','Consolas','Menlo',monospace" font-size="12" letter-spacing="0.5" fill="#5F87A8">Node.js + Python &#183; Claude Sonnet 5</text>

  <!-- right-side proof panel: a compact, real KPI-card echo -->
  <g transform="translate(880, 64)">
    <rect x="0" y="0" width="260" height="192" rx="10" fill="#16344F" stroke="#2E5578" stroke-width="1"/>
    <text x="20" y="32" font-family="'Helvetica Neue','Arial',sans-serif" font-weight="700" font-size="13" letter-spacing="1.5" fill="#9FB8D0">SINCE LAST RUN</text>

    <text x="20" y="76" font-family="'SF Mono','Consolas','Menlo',monospace" font-weight="700" font-size="30" fill="#7DBE8C">6</text>
    <text x="20" y="96" font-family="'Helvetica Neue','Arial',sans-serif" font-size="12" fill="#9FB8D0">CLOSED</text>

    <text x="110" y="76" font-family="'SF Mono','Consolas','Menlo',monospace" font-weight="700" font-size="30" fill="#D6E4F0">169</text>
    <text x="110" y="96" font-family="'Helvetica Neue','Arial',sans-serif" font-size="12" fill="#9FB8D0">STILL OPEN</text>

    <text x="20" y="146" font-family="'SF Mono','Consolas','Menlo',monospace" font-weight="700" font-size="30" fill="#D6E4F0">0</text>
    <text x="20" y="166" font-family="'Helvetica Neue','Arial',sans-serif" font-size="12" fill="#9FB8D0">NEW</text>

    <text x="110" y="146" font-family="'SF Mono','Consolas','Menlo',monospace" font-weight="700" font-size="30" fill="#D6E4F0">0</text>
    <text x="110" y="166" font-family="'Helvetica Neue','Arial',sans-serif" font-size="12" fill="#9FB8D0">REGRESSED</text>
  </g>
</svg>
